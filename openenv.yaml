name: smart-contract-audit-env
version: "1.0.0"
description: "OpenEnv environment for AI-powered Solidity smart contract security auditing. AI agents read real Solidity contracts and identify reentrancy, access control, tx.origin, oracle manipulation, and integer overflow vulnerabilities."
author: "gopichandchalla16"
tags:
  - openenv
  - smart-contracts
  - solidity
  - security
  - web3
  - reinforcement-learning
  - blockchain
  - defi

reward_range: [0.01, 0.99]

tasks:
  - id: easy
    name: "Simple Bank Vulnerability Audit"
    description: "Audit a simple Solidity bank contract with 1 critical reentrancy vulnerability"
    difficulty: easy
    max_steps: 5
    reward_threshold: 0.5
    target_score_range: [0.55, 0.97]

  - id: medium
    name: "DeFi Vault Multi-Vulnerability Audit"
    description: "Audit a DeFi contract with 3 vulnerabilities: reentrancy, missing access control, tx.origin"
    difficulty: medium
    max_steps: 5
    reward_threshold: 0.5
    target_score_range: [0.45, 0.97]

  - id: hard
    name: "Complex DeFi Protocol Full Audit"
    description: "Audit a complex DeFi protocol with 4 critical vulnerabilities including oracle manipulation"
    difficulty: hard
    max_steps: 5
    reward_threshold: 0.5
    target_score_range: [0.35, 0.97]

baseline_scores:
  easy: 0.62
  medium: 0.51
  hard: 0.38

observation_space:
  type: object
  properties:
    task_id:
      type: string
    task_description:
      type: string
    contract_code:
      type: string
    current_score:
      type: number
      minimum: 0.01
      maximum: 0.99
      description: "Score is always strictly between 0 and 1 (exclusive)"
    last_feedback:
      type: string
    step_count:
      type: integer
    max_steps:
      type: integer

action_space:
  type: object
  properties:
    findings:
      type: array
      items:
        type: string
      description: "List of identified vulnerabilities"
    severity:
      type: array
      items:
        type: string
        enum: ["critical", "high", "medium", "low"]
    vulnerable_lines:
      type: array
      items:
        type: integer
      description: "Line numbers of vulnerable code"
    explanation:
      type: string
      description: "Detailed explanation of findings"

reward:
  min: 0.01
  max: 0.99
  type: continuous
  description: "Reward is always strictly between 0.01 and 0.99 — never exactly 0.0 or 1.0"
