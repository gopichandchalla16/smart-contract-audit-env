name: smart_contract_audit_env
version: "1.0.0"
description: "A real-world OpenEnv environment for AI-powered Solidity smart contract security auditing. An agent learns to identify vulnerabilities like reentrancy, access control issues, and integer overflows."
author: "gopichandchalla16"
tags:
  - openenv
  - smart-contracts
  - solidity
  - security
  - web3
  - reinforcement-learning
  - code-review

server:
  port: 8000
  host: "0.0.0.0"

tasks:
  - id: easy
    description: "Audit a simple Solidity contract with 1 critical reentrancy vulnerability"
    difficulty: easy
    max_steps: 5

  - id: medium
    description: "Audit a DeFi contract with 3 vulnerabilities: reentrancy, missing access control, and tx.origin authentication"
    difficulty: medium
    max_steps: 5

  - id: hard
    description: "Audit a complex DeFi protocol with 4 vulnerabilities including oracle manipulation and integer overflow"
    difficulty: hard
    max_steps: 5

observation_space:
  task_id: string
  task_description: string
  contract_code: string
  current_score: float
  last_feedback: string
  step_count: integer
  max_steps: integer

action_space:
  findings: list[string]
  severity: list[string]
  vulnerable_lines: list[integer]
  explanation: string

reward:
  min: 0.0
  max: 1.0
  type: continuous