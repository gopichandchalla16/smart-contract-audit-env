name: smart-contract-audit-env
version: "1.0.0"
description: "OpenEnv environment for AI-powered Solidity smart contract security auditing."
author: "gopichandchalla16"
tags:
  - openenv
  - smart-contracts
  - solidity
  - security
  - web3
  - reinforcement-learning

tasks:
  - id: easy
    description: "Audit a simple Solidity contract with 1 critical reentrancy vulnerability"
    difficulty: easy
    max_steps: 5
    reward_threshold: 0.5

  - id: medium
    description: "Audit a DeFi contract with 3 vulnerabilities"
    difficulty: medium
    max_steps: 5
    reward_threshold: 0.5

  - id: hard
    description: "Audit a complex DeFi protocol with 4 vulnerabilities"
    difficulty: hard
    max_steps: 5
    reward_threshold: 0.5

observation_space:
  type: object
  properties:
    task_id:
      type: string
    task_description:
      type: string
    contract_code:
      type: string
    current_score:
      type: number
      minimum: 0.01
      maximum: 0.99
    last_feedback:
      type: string
    step_count:
      type: integer
    max_steps:
      type: integer

action_space:
  type: object
  properties:
    findings:
      type: array
      items:
        type: string
    severity:
      type: array
      items:
        type: string
    vulnerable_lines:
      type: array
      items:
        type: integer
    explanation:
      type: string

reward:
  min: 0.01
  max: 0.99
  type: continuous
